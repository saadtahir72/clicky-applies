<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEAM IQRA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #e8eef8;
      min-height: 500px;
    }
    .header {
      background: #1557c8;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { font-size: 20px; font-weight: 800; color: #fff; }
    .settings-btn {
      background: rgba(255,255,255,0.14);
      border: 0;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 800;
    }
    .toggle-bar {
      background: #111827;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
    }
    .toggle-label, .toggle-status { font-size: 12px; color: #cbd5e1; font-weight: 800; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #334155;
      border-radius: 22px;
      cursor: pointer;
      transition: 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #2563eb; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
    .form-body, .settings-panel {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }
    .settings-panel { display: none; }
    .settings-panel.active { display: flex; }
    .form-body.hidden { display: none; }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 12px;
      font-weight: 800;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    input[type="text"], select {
      width: 100%;
      padding: 11px 12px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 9px;
      color: #f8fafc;
      font-size: 14px;
      font-weight: 700;
      outline: none;
    }
    input[type="text"]:focus, select:focus { border-color: #60a5fa; }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .save-default {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      margin-top: -3px;
    }
    .save-default span {
      font-size: 12px;
      color: #93c5fd;
      font-weight: 800;
    }
    .apply-btn, .save-settings-btn, .add-btn {
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      font-weight: 800;
    }
    .apply-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
    }
    .apply-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .toast {
      display: none;
      margin: 0 18px 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
    }
    .toast.success { display: block; background: rgba(16,185,129,0.15); color: #86efac; }
    .toast.error { display: block; background: rgba(239,68,68,0.15); color: #fca5a5; }
    .settings-title {
      font-size: 14px;
      font-weight: 800;
      color: #93c5fd;
      margin-bottom: 8px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 110px;
      overflow-y: auto;
    }
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .list-item button {
      background: #7f1d1d;
      border: 0;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
      width: 24px;
      height: 22px;
      font-weight: 800;
    }
    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 7px;
    }
    .add-row input { flex: 1; padding: 9px 10px; font-size: 12px; }
    .add-btn { padding: 9px 12px; font-size: 12px; }
    .save-settings-btn { width: 100%; padding: 11px; font-size: 14px; }
    .footer {
      padding: 0 18px 14px;
      text-align: center;
      font-size: 11px;
      color: #64748b;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">TEAM IQRA</div>
    <button class="settings-btn" id="settingsToggle">Settings</button>
  </div>

  <div class="toggle-bar">
    <span class="toggle-label">Auto popup</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <label class="toggle">
        <input type="checkbox" id="autoPopup" />
        <span class="slider"></span>
      </label>
      <span class="toggle-status" id="toggleStatus">On</span>
    </div>
  </div>

  <div class="form-body" id="mainForm">
    <div class="field-group">
      <label>Job Title</label>
      <input type="text" id="jobTitle" placeholder="Job title" />
    </div>
    <div class="field-group">
      <label>Company</label>
      <input type="text" id="company" placeholder="Company" />
    </div>
    <div class="field-group">
      <label>Job URL</label>
      <input type="text" id="jobUrl" placeholder="https://..." />
    </div>
    <div class="field-row">
      <div class="field-group">
        <label>BD Name</label>
        <select id="bdName"></select>
      </div>
      <div class="field-group">
        <label>Tech Stack</label>
        <select id="techStack"></select>
      </div>
    </div>
    <label class="save-default">
      <input type="checkbox" id="saveDefault" />
      <span>Save as default</span>
    </label>
    <button class="apply-btn" id="applyBtn">Apply</button>
  </div>

  <div class="toast" id="toast"></div>

  <div class="settings-panel" id="settingsPanel">
    <div class="field-group">
      <label>Web App URL</label>
      <input type="text" id="webAppUrl" placeholder="https://script.google.com/macros/s/..." />
    </div>

    <div>
      <div class="settings-title">BD Names</div>
      <div class="list" id="bdList"></div>
      <div class="add-row">
        <input type="text" id="newBdName" placeholder="Add BD name" />
        <button class="add-btn" id="addBdBtn">Add</button>
      </div>
    </div>

    <div>
      <div class="settings-title">Tech Stack</div>
      <div class="list" id="techList"></div>
      <div class="add-row">
        <input type="text" id="newTechStack" placeholder="Add tech stack" />
        <button class="add-btn" id="addTechBtn">Add</button>
      </div>
    </div>

    <button class="save-settings-btn" id="saveSettingsBtn">Save Settings</button>
  </div>

  <div class="footer">DEVELOPED BY SAAD TAHIR</div>
  <script src="popup.js"></script>
</body>
</html>
